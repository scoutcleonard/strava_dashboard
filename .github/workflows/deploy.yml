name: Deploy to shinyapps.io

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libproj-dev \
            libgdal-dev \
            libgeos-dev

      - name: Install R packages
        run: |
          install.packages(c(
            "shiny", "rsconnect", "remotes",
            "dplyr", "tidyr", "readr", "ggplot2", "purrr",
            "lubridate", "scales", "leaflet",
            "here", "htmlwidgets", "googleway", "DT"
          ))
        shell: Rscript {0}

      - name: Check files
        run: |
          cat(".rscignore")
          list.files(recursive = TRUE)
        shell: Rscript {0}

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          install.packages(c(
            "shiny", "rsconnect", "remotes",
            "dplyr", "tidyr", "readr", "ggplot2", "purrr",
            "lubridate", "scales", "leaflet", "leaflet.providers",
            "here", "htmlwidgets", "googleway", "DT"
          ))
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          options(rsconnect.packrat = FALSE)
          rsconnect::deployApp(
            appDir        = ".",
            appPrimaryDoc = "shiny_app.R",
            appName       = "strava-dashboard",
            forceUpdate   = TRUE,
            logLevel      = "verbose"
          )
        shell: Rscript {0}